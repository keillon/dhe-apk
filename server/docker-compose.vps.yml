# Stack DHE na VPS — acesso direto pela porta 8090 (liberada no UFW).
# A porta 80 redireciona pra HTTPS (Traefik) e a 4002 é bloqueada pelo provedor.
# Uso na VPS:
#   docker compose -f docker-compose.vps.yml up -d --build
#   curl http://localhost:8090/health

services:
  dhe-postgres:
    image: postgres:16-alpine
    container_name: dhe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dhe_hidraulicos
      POSTGRES_USER: dhe_app
      POSTGRES_PASSWORD: ${DHE_DB_PASSWORD}
    volumes:
      - dhe_postgres_data:/var/lib/postgresql/data
    networks:
      - dhe-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhe_app -d dhe_hidraulicos"]
      interval: 10s
      timeout: 5s
      retries: 5

  dhe-api:
    build: .
    image: dhe-api:1.0.0
    container_name: dhe-api
    restart: unless-stopped
    depends_on:
      dhe-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dhe_app:${DHE_DB_PASSWORD}@dhe-postgres:5432/dhe_hidraulicos?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4002
      NODE_ENV: production
    ports:
      - "0.0.0.0:8090:4002"
    networks:
      - dhe-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  dhe_postgres_data:
    name: dhe_postgres_data

networks:
  dhe-internal:
    name: dhe-internal
    driver: bridge
