# Stack DHE na VPS — acesso pela porta 80 via Traefik (sem domínio).
# Use quando a porta 4002 estiver bloqueada pelo provedor (Hostinger, etc.).
#
# Pré-requisito: rede traefik-public já existente na VPS.
#   docker network create traefik-public 2>/dev/null || true
#
# Uso:
#   docker compose -f docker-compose.vps-traefik.yml up -d --build
#   curl http://SEU_IP/health

services:
  dhe-postgres:
    image: postgres:16-alpine
    container_name: dhe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dhe_hidraulicos
      POSTGRES_USER: dhe_app
      POSTGRES_PASSWORD: ${DHE_DB_PASSWORD}
    volumes:
      - dhe_postgres_data:/var/lib/postgresql/data
    networks:
      - dhe-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhe_app -d dhe_hidraulicos"]
      interval: 10s
      timeout: 5s
      retries: 5

  dhe-api:
    build: .
    image: dhe-api:1.0.0
    container_name: dhe-api
    restart: unless-stopped
    depends_on:
      dhe-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dhe_app:${DHE_DB_PASSWORD}@dhe-postgres:5432/dhe_hidraulicos?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4002
      NODE_ENV: production
    networks:
      - dhe-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dhe-api-ip.rule=Host(`${DHE_VPS_IP}`)"
      - "traefik.http.routers.dhe-api-ip.entrypoints=web"
      - "traefik.http.routers.dhe-api-ip.priority=100"
      - "traefik.http.services.dhe-api-ip.loadbalancer.server.port=4002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  dhe_postgres_data:
    name: dhe_postgres_data

networks:
  dhe-internal:
    name: dhe-internal
    driver: bridge
  traefik-public:
    external: true
